services:
  weather-patterns:
    build:
      context: .
      dockerfile: Dockerfile
    image: weather-patterns:latest
    working_dir: /app
    volumes:
      - ./:/app
    command:
      - python
      - -m
      - weather_patterns
      - run-pipeline
      - --csv
      - hly4935_subset.csv
      - --output-dir
      - artifacts
